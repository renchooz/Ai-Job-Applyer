services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-resume-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: ai-resume-client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ai-resume-mongo
    ports:
    - "27017:27017"
    volumes:
    - mongo_data:/data/db
    restart: unless-stopped 

volumes:
  mongo_data:
